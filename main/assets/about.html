<head>
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>
<style>
  body {
    background-color: #18191a;
    color: #E4E6EB;
    font-family: 'Optimistic', 'Montserrat', 'Helvetica', 'Arial', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
    overflow: hidden;
  }
  h2 {
    font-family: 'Optimistic', 'system-ui', 'Montserrat', 'Helvetica', 'Arial', sans-serif;
    margin-bottom: 12px;
    margin-top: 0px;
  }
  .logo {
    width: 100px;
    height: 100px;
  }
  #version {
    font-size: 14px;
    line-height: 20px;
    font-weight: 300;
  }
  #env {
    color: '#FFFFFF99';
    font-size: 14px;
    line-height: 20px;
    margin-bottom: 32px;
    font-weight: 300;
  }
  a {
    margin-top: 8px;
    text-decoration: none;
    text-transform: none;
    font-size: 14px;
    line-height: 20px;
    color: #FFFFFF99;
    transition: all .2s;
  }
  a:hover {
    color: #E4E6EB;
  }
</style>
<body>
  <img class="logo" src="icons/512x512.png" alt="Haptics Studio" />
  <h2>Haptics Studio</h2>
  <div id="version">Version</div>
  <div id="env">Environment</div>
  <a href="http://licenses">Acknowledgments</a>
</body>
